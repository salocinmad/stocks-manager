services:
  # MongoDB 7.0 (requiere CPU con soporte AVX)
  # Si tu CPU NO soporta AVX, usa docker-compose.mongo4.4.yml con MongoDB 4.4
  mongo:
    image: mongo:7
    container_name: stocks-manager-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: portfolio-manager
    networks:
      - stocks-manager-network

  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: stocks-manager-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      # Usar volumen nombrado para .env (compatible con Portainer)
      # Montamos el volumen en un directorio para evitar que Docker cree un directorio en lugar de archivo
      - backend_env:/app/env
    depends_on:
      - mongo
    networks:
      - stocks-manager-network

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stocks-manager-frontend
    restart: unless-stopped
    ports:
      # Cambiar a puerto 8080 para evitar conflictos con servicios en puerto 80
      # Puedes cambiarlo a "80:80" si el puerto 80 está libre
      - "8080:80"
    depends_on:
      - backend
    networks:
      - stocks-manager-network

volumes:
  mongo_data:
  backend_env:

networks:
  stocks-manager-network:
    driver: bridge
