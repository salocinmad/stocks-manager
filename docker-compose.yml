services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_manager}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - db_secrets:/docker-entrypoint-initdb.d

  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-portfolio_manager}
      - DB_USER=${POSTGRES_USER:-user}
      - DB_PASS=${POSTGRES_PASSWORD:-password}
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
    depends_on:
      - postgres
    volumes:
      - backend_env:/app/env
      - profile_pictures_data:/app/images/profile-pictures
      - db_secrets:/run/secrets:ro

  frontend:
    build:
      context: .
      args:
        VITE_API_URL: http://server:5000
    ports:
      - "3000:80"
    stdin_open: true
    tty: true
    depends_on:
      - server

volumes:
  postgres_data:
  backend_env:
  profile_pictures_data:
  db_secrets:
